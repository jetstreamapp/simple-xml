name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (major, minor, patch, or explicit like 1.2.3)"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "jetstream-bot[bot]"
          git config user.email "jetstream-bot[bot]@users.noreply.github.com"

      - name: Release
        run: npx release-it ${{ inputs.version }} --ci
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
